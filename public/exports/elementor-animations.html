<!-- ========================================= -->
<!-- 1. FADE UP ON SCROLL ANIMATION -->
<!-- ========================================= -->
<!-- Add class "fade-up" to any element -->
<style>
.fade-up {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.6s ease-out, transform 0.6s ease-out;
}
.fade-up.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Staggered children animation */
.fade-up-stagger > * {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s ease-out, transform 0.5s ease-out;
}
.fade-up-stagger.visible > *:nth-child(1) { transition-delay: 0ms; }
.fade-up-stagger.visible > *:nth-child(2) { transition-delay: 100ms; }
.fade-up-stagger.visible > *:nth-child(3) { transition-delay: 200ms; }
.fade-up-stagger.visible > *:nth-child(4) { transition-delay: 300ms; }
.fade-up-stagger.visible > *:nth-child(5) { transition-delay: 400ms; }
.fade-up-stagger.visible > *:nth-child(6) { transition-delay: 500ms; }
.fade-up-stagger.visible > * {
  opacity: 1;
  transform: translateY(0);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const fadeElements = document.querySelectorAll('.fade-up, .fade-up-stagger');
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
  
  fadeElements.forEach(el => observer.observe(el));
});
</script>

<!-- 8. TIMELINE / PROCESS STEPS -->
<!-- ========================================= -->
<style>
.timeline-vertical {
  position: relative;
  padding-left: 40px;
}
.timeline-vertical::before {
  content: '';
  position: absolute;
  left: 15px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, #3b82f6, #8b5cf6);
}
.timeline-item {
  position: relative;
  padding-bottom: 40px;
  opacity: 0;
  transform: translateX(-20px);
  transition: all 0.5s ease;
}
.timeline-item.visible {
  opacity: 1;
  transform: translateX(0);
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: -33px;
  top: 0;
  width: 12px;
  height: 12px;
  background: #3b82f6;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
}
.timeline-number {
  font-size: 48px;
  font-weight: 700;
  color: rgba(59, 130, 246, 0.2);
  line-height: 1;
  margin-bottom: 8px;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const timelineItems = document.querySelectorAll('.timeline-item');
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, index) => {
      if (entry.isIntersecting) {
        setTimeout(() => {
          entry.target.classList.add('visible');
        }, index * 150);
      }
    });
  }, { threshold: 0.2 });
  
  timelineItems.forEach(item => observer.observe(item));
});
</script>

<style>
.modal-overlay {

  transform: translate(-50%, -50%) scale(1);
}

  transition: background 0.3s ease;

  background: rgba(255, 255, 255, 0.2);
}
</style>

<script>
function openModal(modalId) {
  document.getElementById(modalId).classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('active');
  document.body.style.overflow = '';
}
// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(modal => {
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal(modal.id);
  });
});
// Close on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(modal => {
      closeModal(modal.id);
    });
  }
});
</script>

<!-- 12. COUNTER / STATS ANIMATION -->
<!-- ========================================= -->
<style>
.stat-item {
  text-align: center;
}
.stat-number {
  font-size: 48px;
  font-weight: 700;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-top: 8px;
}
</style>

<script>
function animateCounter(element, target, duration = 2000) {
  let start = 0;
  const increment = target / (duration / 16);
  const suffix = element.dataset.suffix || '';
  const prefix = element.dataset.prefix || '';
  
  function update() {
    start += increment;
    if (start < target) {
      element.textContent = prefix + Math.floor(start) + suffix;
      requestAnimationFrame(update);
    } else {
      element.textContent = prefix + target + suffix;
    }
  }
  update();
}

document.addEventListener('DOMContentLoaded', function() {
  const counters = document.querySelectorAll('[data-counter]');
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !entry.target.dataset.animated) {
        entry.target.dataset.animated = 'true';
        animateCounter(
          entry.target,
          parseInt(entry.target.dataset.counter),
          2000
        );
      }
    });
  }, { threshold: 0.5 });
  
  counters.forEach(counter => observer.observe(counter));
});
</script>

<!-- 14. FILTER TABS WITH ANIMATION -->
<!-- ========================================= -->
<style>
.filter-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 40px;
}
.filter-tab {
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 100px;
  color: rgba(255, 255, 255, 0.7);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
}
.filter-tab:hover {
  background: rgba(255, 255, 255, 0.1);
  color: white;
}
.filter-tab.active {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  border-color: transparent;
  color: white;
  box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
}

/* Filtered items animation */
.filter-item {
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.filter-item.hidden {
  opacity: 0;
  transform: scale(0.9);
  pointer-events: none;
  position: absolute;
}
</style>

<script>
function initFilters() {
  const tabs = document.querySelectorAll('.filter-tab');
  const items = document.querySelectorAll('.filter-item');
  
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      // Update active tab
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      
      const filter = tab.dataset.filter;
      
      // Filter items
      items.forEach(item => {
        if (filter === 'all' || item.dataset.category === filter) {
          item.classList.remove('hidden');
        } else {
          item.classList.add('hidden');
        }
      });
    });
  });
}
document.addEventListener('DOMContentLoaded', initFilters);
</script>
